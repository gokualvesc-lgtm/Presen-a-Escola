<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gerenciar Usuários</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#071026;color:#e6eef8;margin:0;padding:28px}
    .container{max-width:1100px;margin:0 auto}
    h1{margin:0 0 8px}
    .sub{color:#9fb0c8;margin-bottom:18px}
    .card{background:rgba(255,255,255,0.02);padding:16px;border-radius:10px;border:1px solid rgba(255,255,255,0.03)}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.03);text-align:left}
    th{color:#9fb0c8;font-size:0.9rem}
    .actions{display:flex;gap:8px}
    .btn{padding:8px 10px;border-radius:8px;border:none;cursor:pointer;color:#fff}
    .edit{background:#38bdf8}
    .delete{background:#ef4444}
    .back{background:transparent;border:1px solid rgba(255,255,255,0.06);color:#9fb0c8;padding:8px 10px;border-radius:8px}
    .empty{padding:18px;color:#9fb0c8;text-align:center}
  </style>
</head>
<body>
  <div class="container">
    <h1>Gerenciar Usuários</h1>
    <div class="sub">Lista de usuários cadastrados no sistema.</div>

    {% if message %}
      <div style="margin-bottom:10px;color:#ffd166">{{ message }}</div>
    {% endif %}

    <div class="card">
      {% if usuarios %}
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            {% for u in usuarios %}
              <tr>
                <td>{{ u[0] }}</td>
                <td>{{ u[1] }}</td>
                <td>{{ u[2] }}</td>
                <td>
                  <div class="actions">
                    <form action="/admin/users/edit/{{ u[0] }}" method="get" style="display:inline">
                      <button class="btn edit" type="submit">Editar</button>
                    </form>
                    <form action="/admin/users/delete/{{ u[0] }}" method="POST" style="display:inline" onsubmit="return confirm('Excluir usuário?');">
                      <button class="btn delete" type="submit">Excluir</button>
                    </form>
                  </div>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      {% else %}
        <div class="empty">Nenhum usuário encontrado.</div>
      {% endif %}
    </div>

    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="back" onclick="window.location.href='/admin'">Voltar ao dashboard</button>
      <button class="btn" style="background:#10b981" onclick="window.location.href='/admin/users/new'">Novo usuário</button>
    </div>
  </div>
</body>
</html>
