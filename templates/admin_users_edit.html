<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Editar Usuário</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#071026;color:#e6eef8;margin:0;padding:28px}
    .container{max-width:500px;margin:0 auto}
    h1{margin:0 0 8px}
    .sub{color:#9fb0c8;margin-bottom:18px}
    .card{background:rgba(255,255,255,0.02);padding:20px;border-radius:10px;border:1px solid rgba(255,255,255,0.03)}
    form{display:flex;flex-direction:column;gap:12px}
    label{font-size:0.95rem;color:#9fb0c8;display:block;margin-bottom:4px}
    input[type=text],input[type=email],input[type=password]{width:100%;padding:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#e6eef8;box-sizing:border-box}
    input[type=text]:focus,input[type=email]:focus,input[type=password]:focus{outline:none;border-color:#38bdf8}
    .actions{display:flex;gap:8px;margin-top:12px}
    .btn{padding:10px 12px;border-radius:8px;border:none;cursor:pointer;color:#fff;font-weight:600}
    .primary{background:#38bdf8}
    .secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:#9fb0c8}
    .message{margin-bottom:10px;color:#ffd166}
  </style>
</head>
<body>
  <div class="container">
    <h1>Editar Usuário</h1>
    <div class="sub">Modifique as informações do usuário.</div>

    {% if message %}
      <div class="message">{{ message }}</div>
    {% endif %}

    <div class="card">
      <form action="/admin/users/update/{{ usuario[0] }}" method="post">
        <div>
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" value="{{ usuario[1] }}" required />
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" value="{{ usuario[2] }}" required />
        </div>

        <div>
          <label for="senha">Senha (deixe em branco para não alterar)</label>
          <input id="senha" name="senha" type="password" />
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">Salvar</button>
          <button class="btn secondary" type="button" onclick="window.location.href='/admin/users'">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
